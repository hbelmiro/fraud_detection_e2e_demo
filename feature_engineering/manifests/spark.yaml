apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: my-spark-job
  namespace: my-spark-job
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "quay.io/hbelmiro/fraud-detection-e2e-demo-feature-engineering:dev-1746737282"
  mainApplicationFile: local:///app/feast_apply.py
  sparkVersion: "3.5.5"
  restartPolicy:
    type: Never
  driver:
    serviceAccount: spark
    cores: 1
    coreLimit: "1200m"
    memory: "1g"
  executor:
    cores: 1
    instances: 1
    memory: "1g"
